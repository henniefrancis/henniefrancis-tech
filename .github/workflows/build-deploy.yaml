name: Deployment Workflow

on:
  workflow_dispatch:
  #pull_request_target:
  push:
    branches:
      - feature/refactoring
      - develop
      - release
      - main
    # types:  
    #   - closed
    paths:
     - 'src/**'
     - 'Dockerfile'
     - '.github/workflows/*.yaml'

env:
  
  AWS_REGION : af-south-1

permissions:
      id-token: write
      contents: read


jobs:
  build:
    name: Build Application
    runs-on: ubuntu-24.04
    #if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.event.action == 'closed' && (github.base_ref == 'develop' || github.base_ref == 'release') && github.event.pull_request.merged == true)) }}
    steps:
      - uses: bhowell2/github-substring-action@1.0.2
        id: directory
        name: Get Directory
        with:
            value: ${{ github.repository }}
            index_of_str: "henniefrancis/"

      - name: Check GitHub Repo name
        id: files
        run: echo ${{ steps.directory.outputs.substring }}

      - uses: actions/checkout@v4
        name: Setup .NET

      - name: Restore .NET
        id: restore-dotnet
        run: |
          cd src/**/
          dotnet restore *.csproj

      - name: Build .NET
        id: build-dotnet
        run: |
          cd src/**/
          dotnet build --configuration Release

      - name: Test .NET
        id: test-dotnet
        run: |
          cd src/**/
          dotnet test --no-build --verbosity normal

      - name: Publish .NET
        id: publish-dotnet
        run: |
          cd src/**/
          dotnet publish

      - name: Path to Project
        id: project-path
        run: |
          cd src/**/
          echo 'project-path=src/'${{ steps.directory.outputs.substring }}'/'${{ steps.directory.outputs.substring }}'.csproj' >> $GITHUB_ENV

      - name: Docker Path
        id: docker-path
        run: |
          cd src/**/
          echo 'docker-path='${{ steps.directory.outputs.substring }}'/Dockerfile' >> $GITHUB_ENV

      - name: Path to Docker
        id: path-to-docker
        run: |
          echo ${{ env.docker-path }}

      - uses: kzrnm/get-net-sdk-project-versions-action@v2
        id: get-version
        with:
          proj-path: ${{ env.project-path }}
      - run: echo "${{steps.get-version.outputs.version}}"

    outputs:
      project-version: ${{ steps.get-version.outputs.version }}
      docker-path: ${{ env.docker-path }}
  release:
    name: Create Release
    needs:
      - build
    runs-on: ubuntu-24.04
    steps:
      - uses: bhowell2/github-substring-action@1.0.2
        id: directory
        name: Get Directory
        with:
            value: ${{ github.repository }}
            index_of_str: "henniefrancis/"

      - name: Check GitHub Repo name
        id: files
        run: echo ${{ steps.directory.outputs.substring }}

      - uses: actions/checkout@v4
        name: Checkout files

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          audience: sts.amazonaws.com
          aws-region: af-south-1
          role-to-assume: arn:aws:iam::710802848577:role/dcs-710802848577-gh-srv-acc-role-prd

      - name: Login to Amazon ECR Private
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          DOCKERFILE: ${{ needs.build.outputs.docker-path }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: dilli-it/${{ steps.directory.outputs.substring }}
          IMAGE_TAG: ${{ needs.build.outputs.project-version }}
        run: |
          cd src
          echo "Building Docker image..."
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f $DOCKERFILE .
          echo "Pushing Docker image..."
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

