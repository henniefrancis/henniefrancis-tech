name: Lint — henniefrancis.tech

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.htmlhintrc'

permissions:
  contents: read

jobs:
  # ── HTMLHint ─────────────────────────────────────────────────
  # Static site — lints all HTML against .htmlhintrc. Fails on any
  # error (unclosed tags, duplicate ids, missing alt/doctype, etc.).
  html:
    name: HTMLHint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run HTMLHint
        run: npm run lint:html
