name: E2E Tests — henniefrancis.tech

on:
  workflow_dispatch:
  # Run after a successful production deploy so E2E exercises the
  # freshly deployed site rather than the previous build.
  workflow_run:
    workflows: ["Deploy — henniefrancis.tech"]
    types: [completed]
    branches: [main]
  schedule:
    # Nightly safety net at 02:30 UTC against production
    - cron: '30 2 * * *'

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # On a workflow_run trigger only run if the deploy succeeded; always
    # run for manual dispatch and the nightly schedule.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against production
        run: npx playwright test
        env:
          BASE_URL: https://henniefrancis.tech

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
