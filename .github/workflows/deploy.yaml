name: Deploy — henniefrancis.tech

# Pipeline: quality gates (security + lint, parallel) → build → deploy.
# Deploys go S3 → EC2 via SSM Run Command (no SSH, no stored AWS keys —
# OIDC only) → nginx validate+reload → CloudFront invalidation.
#
# All environment-specific values come from repository VARIABLES so this
# file is a reusable template (see terraform/README.md for the list):
#   vars.AWS_DEPLOY_ROLE_ARN   IAM role assumed via OIDC
#   vars.AWS_REGION            e.g. af-south-1
#   vars.ARTIFACTS_BUCKET      deploy artifacts bucket
#   vars.WEB_ROOT              e.g. /var/www/henniefrancis-tech/html
# and one secret: CLOUDFRONT_DISTRIBUTION_ID.
#
# The TARGET INSTANCE is not a variable: it is discovered at deploy time
# by its Name tag (*-<project>-ec2, running). Replacing the instance via
# Terraform therefore never leaves this pipeline aiming at a dead id.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run on the same branch so a fast follow-up
# commit doesn't queue behind a slow deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal top-level permissions — each job adds only what it needs.
permissions:
  id-token: write   # OIDC → AWS credential exchange
  contents: read

env:
  PROJECT_NAME: henniefrancis-tech

jobs:
  # ───────────────────────────────────────────────────────────
  # Stage 1 — Quality Gates (parallel, ALL must pass)
  # ───────────────────────────────────────────────────────────

  security:
    name: Security Scan
    uses: ./.github/workflows/security.yml
    secrets: inherit

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # ───────────────────────────────────────────────────────────
  # Stage 2 — Build (package the static site)
  # ───────────────────────────────────────────────────────────

  build:
    name: Build Application
    needs: [security, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Static site — no compile step. Zip from inside src/ so the
      # archive root is the site root.
      - name: Package artifact
        run: |
          cd src
          zip -r "../${PROJECT_NAME}.zip" . -x "*.DS_Store"
          cd ..
          unzip -l "${PROJECT_NAME}.zip" | tail -n 3

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}
          path: ${{ env.PROJECT_NAME }}.zip
          retention-days: 1

  # ───────────────────────────────────────────────────────────
  # Stage 3 — Deploy (S3 upload → EC2 via SSM → nginx reload)
  # ───────────────────────────────────────────────────────────

  deployment:
    name: Application Deployment
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production   # deployment protection rules + OIDC sub claim
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ARTIFACTS_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
      WEB_ROOT: ${{ vars.WEB_ROOT }}
    steps:
      - name: Preflight — required configuration present
        run: |
          missing=0
          for v in AWS_REGION ARTIFACTS_BUCKET WEB_ROOT; do
            if [ -z "${!v}" ]; then
              echo "::error::Repository variable behind '$v' is not set (see terraform/README.md §4)."
              missing=1
            fi
          done
          if [ -z "${{ vars.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "::error::Repository variable AWS_DEPLOY_ROLE_ARN is not set."
            missing=1
          fi
          exit $missing

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Discover the target instance by its Name tag rather than a pinned
      # id: after a Terraform -replace the id changes, and a stale
      # EC2_INSTANCE_ID variable would strand deploys (SSM answers
      # "Undeliverable" or "InvalidInstanceId"). Needs the deploy role's
      # DiscoverInstance statement (iam.tf).
      - name: Resolve target instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=*-${PROJECT_NAME}-ec2" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running instance found with Name tag *-${PROJECT_NAME}-ec2"
            exit 1
          fi
          if [ "$(echo "$INSTANCE_ID" | wc -w)" -ne 1 ]; then
            echo "::error::Expected exactly one running instance, found: $INSTANCE_ID"
            exit 1
          fi
          echo "Deploying to instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PROJECT_NAME }}

      - name: Upload to S3
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}
          aws s3 cp "${PROJECT_NAME}.zip" \
            "s3://${ARTIFACTS_BUCKET}/${PROJECT_NAME}/${VERSION}/${PROJECT_NAME}.zip"
          aws s3 cp "${PROJECT_NAME}.zip" \
            "s3://${ARTIFACTS_BUCKET}/${PROJECT_NAME}/latest/${PROJECT_NAME}.zip"
          echo "Uploaded version: ${VERSION}"

      # Run a command on the instance via SSM and FAIL THE JOB unless it
      # succeeds on the box (the old pipeline was fire-and-forget: the
      # job went green even when the instance-side commands failed).
      - name: Deploy to EC2
        run: |
          run_ssm() {
            local comment="$1"; shift
            local params
            params=$(jq -cn --args '{commands: $ARGS.positional}' "$@")
            local cmd_id
            cmd_id=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "$comment" \
              --parameters "$params" \
              --query "Command.CommandId" \
              --output text)
            echo "SSM Command ID: $cmd_id ($comment)"

            # Poll until the command leaves Pending/InProgress (up to 10 min).
            # `aws ssm wait command-executed` gives up after a fixed ~100 s,
            # which a first full-site copy (~146 MB) on a t4g.nano exceeds —
            # deploy #10 died with "Max attempts exceeded ... InProgress".
            local status
            for _ in $(seq 1 60); do
              status=$(aws ssm get-command-invocation \
                --command-id "$cmd_id" --instance-id "$INSTANCE_ID" \
                --query "StatusDetails" --output text 2>/dev/null || echo "Pending")
              case "$status" in
                Pending|InProgress|Delayed) sleep 10 ;;
                *) break ;;
              esac
            done
            echo "Status: $status"
            if [ "$status" != "Success" ]; then
              echo "::group::Instance stderr"
              aws ssm get-command-invocation \
                --command-id "$cmd_id" --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              echo "::endgroup::"
              return 1
            fi
          }

          # NOTE: workdir is /var/tmp (DISK-backed), not /tmp. AL2023 mounts
          # /tmp as tmpfs sized to ~half of RAM — ~256 MB on a t4g.nano —
          # and the ~146 MB site zip + its unzipped copy blew straight
          # through that ("write error (disk full?)", unzip exit 50).
          #
          # FETCH VIA PRESIGNED URL + curl — NOT `aws s3 cp` — on the box.
          # aws-cli v2 carries a ~200 MB resident footprint; copying the
          # ~142 MB artifact with it on a 512 MB t4g.nano swap-thrashed and
          # hung the SSM command indefinitely (deploy #10 was still InProgress
          # 15+ min in). The runner has creds + RAM, so it presigns the object;
          # the box streams it to disk with curl (~a few MB of memory).
          PRESIGNED_URL=$(aws s3 presign \
            "s3://${ARTIFACTS_BUCKET}/${PROJECT_NAME}/latest/${PROJECT_NAME}.zip" \
            --expires-in 1800)

          run_ssm "deploy ${PROJECT_NAME} ${GITHUB_SHA::7}" \
            "set -euo pipefail" \
            "curl -fsS \"${PRESIGNED_URL}\" -o /var/tmp/${PROJECT_NAME}.zip" \
            "rm -rf /var/tmp/${PROJECT_NAME}-deploy" \
            "unzip -o /var/tmp/${PROJECT_NAME}.zip -d /var/tmp/${PROJECT_NAME}-deploy" \
            "rsync -a --delete /var/tmp/${PROJECT_NAME}-deploy/ ${WEB_ROOT}/" \
            "chown -R nginx:nginx ${WEB_ROOT}" \
            "rm -rf /var/tmp/${PROJECT_NAME}.zip /var/tmp/${PROJECT_NAME}-deploy"

      - name: Reload Nginx
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "nginx validate+reload" \
            --parameters '{"commands":["nginx -t && systemctl reload nginx"]}' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text)
          echo "Nginx reload status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      # Without this, CloudFront can keep serving cached HTML/CSS until
      # the origin TTLs lapse. The nginx cache rules make HTML no-cache,
      # so this is belt-and-braces — but it makes CSS/JS updates instant.
      - name: Invalidate CloudFront cache
        run: |
          if [ -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "No CLOUDFRONT_DISTRIBUTION_ID secret set — skipping (no CloudFront fronting the site yet)."
            exit 0
          fi
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "Created invalidation: $INVALIDATION_ID"
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"
          echo "CloudFront invalidation complete."

      - name: Update Deployment Badge
        if: always()
        continue-on-error: true
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
          GIST_ID: ${{ secrets.DEPLOY_BADGE_GIST_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$GIST_ID" ] || [ -z "$GIST_SECRET" ]; then
            echo "Badge gist not configured — skipping."
            exit 0
          fi
          python3 - << 'PYEOF'
          import json, urllib.request, os
          try:
            passed = os.environ.get("JOB_STATUS") == "success"
            content = json.dumps({
              "schemaVersion": 1,
              "label": "Deploy",
              "message": "Deployed" if passed else "Failed",
              "color": "brightgreen" if passed else "red"
            })
            body = json.dumps({"files": {"henniefrancis-tech-deploy-badge.json": {"content": content}}}).encode()
            req = urllib.request.Request(
              f"https://api.github.com/gists/{os.environ['GIST_ID']}",
              data=body, method="PATCH")
            req.add_header("Authorization", f"Bearer {os.environ['GIST_SECRET']}")
            req.add_header("Content-Type", "application/json")
            urllib.request.urlopen(req)
            print("Deploy badge updated")
          except Exception as e:
            print(f"::warning::Deploy badge skipped: {e}")
          PYEOF
