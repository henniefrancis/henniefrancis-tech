name: Terraform — henniefrancis.tech

# Terraform EXECUTES REMOTELY in HCP Terraform (org: henniefrancis,
# workspace: henniefrancis-tech) via the workspace's VCS connection to
# this repository:
#   - pull requests            -> TFC runs an automatic speculative PLAN
#   - push to main (terraform/**) -> TFC runs PLAN + AUTO-APPLY
# AWS credentials live in the org's variable sets. GitHub holds NO
# tokens or cloud credentials for Terraform at all — TFC watches the
# repo itself (working directory: terraform, trigger: terraform/**/*).
#
# This workflow is the static quality gate that runs BEFORE code merges:
# fmt, validate, and the mock-provider unit tests. No credentials needed.

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: fmt / validate / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '>=1.15.0 <2.0.0'
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive -diff

      # -backend=false skips the cloud block: providers only, no token.
      - name: Init (providers only)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate -no-color

      - name: Unit tests (mock providers)
        run: terraform test -no-color
