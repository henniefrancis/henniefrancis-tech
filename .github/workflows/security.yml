name: Security Scan — henniefrancis.tech

on:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:
  schedule:
    # Weekly sweep (Mon 03:00 UTC) so new CVEs surface even without pushes
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  # ── Secret Scanning ──────────────────────────────────────────
  # Full git history scan — catches secrets in past commits too.
  secrets:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Dependency Vulnerability Check ───────────────────────────
  # The site ships zero runtime npm dependencies; this guards the day
  # someone adds one, and fails on high/critical CVEs.
  dependencies:
    name: Dependency Audit (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical CVEs
        run: npm audit --audit-level=high --omit=dev

  # ── Filesystem Vulnerability Scan ────────────────────────────
  # Trivy scans the source tree (incl. lockfiles) for CRITICAL/HIGH
  # CVEs. Ignores unfixed vulnerabilities so the gate doesn't block on
  # issues with no patch available yet.
  trivy:
    name: Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
